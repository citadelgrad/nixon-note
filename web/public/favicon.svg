<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .brain-bg { fill: #6b7d5a; }
      .brain-highlight { fill: #8a9a78; }
      .brain-detail { fill: #546445; }
    </style>
  </defs>

  <!-- Brain shape -->
  <g transform="translate(50, 50)">
    <!-- Left hemisphere -->
    <path class="brain-bg" d="M -20,-25 Q -35,-20 -35,-10 Q -35,0 -30,10 Q -25,20 -15,25 L -10,22 Q -15,15 -18,8 Q -20,0 -18,-8 Q -15,-15 -10,-22 Z"/>

    <!-- Right hemisphere -->
    <path class="brain-bg" d="M 20,-25 Q 35,-20 35,-10 Q 35,0 30,10 Q 25,20 15,25 L 10,22 Q 15,15 18,8 Q 20,0 18,-8 Q 15,-15 10,-22 Z"/>

    <!-- Center connection -->
    <ellipse class="brain-detail" cx="0" cy="0" rx="12" ry="28"/>

    <!-- Left folds/details -->
    <path class="brain-highlight" d="M -25,-15 Q -28,-10 -28,-5 Q -28,0 -25,5" fill="none" stroke="#8a9a78" stroke-width="2" stroke-linecap="round"/>
    <path class="brain-highlight" d="M -18,-18 Q -20,-12 -20,-6 Q -20,0 -18,6" fill="none" stroke="#8a9a78" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Right folds/details -->
    <path class="brain-highlight" d="M 25,-15 Q 28,-10 28,-5 Q 28,0 25,5" fill="none" stroke="#8a9a78" stroke-width="2" stroke-linecap="round"/>
    <path class="brain-highlight" d="M 18,-18 Q 20,-12 20,-6 Q 20,0 18,6" fill="none" stroke="#8a9a78" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Top connection -->
    <path class="brain-detail" d="M -10,-25 Q 0,-28 10,-25" fill="none" stroke="#546445" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Bottom folds -->
    <path class="brain-highlight" d="M -15,20 Q -10,18 -5,20" fill="none" stroke="#8a9a78" stroke-width="1.5" stroke-linecap="round"/>
    <path class="brain-highlight" d="M 5,20 Q 10,18 15,20" fill="none" stroke="#8a9a78" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
