<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NixonNote Clipper Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #f8fafc;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 0.025em;
      text-transform: uppercase;
      color: #475569;
    }
    label {
      display: block;
      margin-bottom: 12px;
    }
    .label-text {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input[type="url"],
    input[type="password"] {
      display: block;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: white;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    #save {
      background: #2563eb;
      color: white;
      flex: 1;
    }
    #save:hover { background: #1d4ed8; }
    #test {
      background: #e2e8f0;
      color: #475569;
    }
    #test:hover { background: #cbd5e1; }
    button:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    #status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .status-success { display: block; background: #dcfce7; color: #166534; }
    .status-error { display: block; background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>NixonNote Settings</h1>

  <label>
    <span class="label-text">API Base URL</span>
    <input id="apiBaseUrl" type="url" placeholder="http://localhost:9999">
  </label>

  <label>
    <span class="label-text">API Token</span>
    <input id="apiToken" type="password" placeholder="your-bearer-token">
  </label>

  <div class="actions">
    <button id="save">Save</button>
    <button id="test">Test Connection</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
